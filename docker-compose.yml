services:
  app:
    build: .
    container_name: counselor-agent
    restart: unless-stopped
    # 不对外暴露端口，只在内部网络供 Nginx 访问
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    volumes:
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - counselor-net

  nginx:
    image: nginx:alpine
    container_name: counselor-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-39527}:80"
    volumes:
      - ./nginx/counselor-agent.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - counselor-net

networks:
  counselor-net:
    driver: bridge

volumes:
  app-logs:
