server:
  port: 8081

spring:
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-v4-pro
          temperature: 0.3
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mvc:
    async:
      request-timeout: 300000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: info
    com.counselor: info
  file:
    name: /app/logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30

counselor:
  search:
    enabled: true
    provider: zhipu
    zhipu:
      api-key: ${ZHIPU_API_KEY}
    max-results: 5
    max-extract-urls: 10
    max-iterations: 3
    llm-max-concurrency: 2
    timeout-seconds: 30
