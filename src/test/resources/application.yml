spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never
  ai:
    openai:
      api-key: test-key
      base-url: https://api.deepseek.com/v1
      chat:
        options:
          model: deepseek-chat

logging:
  level:
    com.counselor.agent: DEBUG
